<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1>Submit Aduan</h1>
    <form action="submit_aduan.php" method="POST">
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required><br><br>

        <label for="no_unit">No. Unit:</label>
        <input type="text" id="no_unit" name="no_unit" required><br><br>

        <label for="tajuk_aduan">Tajuk Aduan:</label>
        <input type="text" id="tajuk_aduan" name="tajuk_aduan" required><br><br>

        <label for="no_tel">No. Tel:</label>
        <input type="tel" id="no_tel" name="no_tel" required><br><br>

        <label for="aduan">Aduan:</label>
        <textarea id="aduan" name="aduan" required></textarea><br><br>

        <input type="submit" value="Submit Aduan">
    </form>
